name: CI

# MENTOR NOTE — fixing the v1.3 "No CI/CD" / CI/CD:0/10 finding.
# Runs on every push and PR: builds + tests the backend (the test suite
# uses H2 in-memory — see application-test.properties — so this job needs
# no database service container and no secrets to run), and builds the
# frontend. A deployment stage is intentionally NOT included — wiring this
# to a real cloud target needs real credentials/secrets this repository
# doesn't have; see README.md "Deploying" for the manual/self-hosted path.
# Adding a deploy job here is a one-step follow-up once you have a target
# environment and its secrets configured in this repo's GitHub Actions
# settings.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: backend
        run: mvn -B clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t scms-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t scms-frontend:ci ./frontend
