# application-prod.properties — production overrides
#
# Activate with SPRING_PROFILES_ACTIVE=prod. This also disables DataSeeder
# (annotated @Profile("!prod")) — no demo accounts with known passwords are
# ever created in a production deployment. See README.md "First production
# admin" for how to create your real first admin account instead.

spring.jpa.show-sql=false
logging.level.com.scms=INFO
logging.level.org.springframework.security=WARN
cookie.secure=true
security.hsts.enabled=true
