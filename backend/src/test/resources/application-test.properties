# application-test.properties — used by @DataJpaTest / @SpringBootTest in CI
#
# Uses H2 in-memory instead of MySQL so tests run with zero external
# dependencies (no Docker/MySQL required just to run `mvn test`). Flyway is
# disabled here and Hibernate generates the schema directly from the
# entities (ddl-auto=create-drop) — H2 is not MySQL, so exercising the real
# Flyway migrations against it would test H2's SQL dialect, not production
# behaviour. The Flyway migrations themselves are still validated by being
# the ONLY schema source for the dev/prod profiles against real MySQL.

spring.datasource.url=jdbc:h2:mem:scms_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

jwt.secret=test-only-secret-key-not-for-production-use-minimum-64-characters-needed
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

cors.allowed-origins=http://localhost:5173
cookie.secure=false
security.hsts.enabled=false
notifications.email.enabled=false

logging.level.com.scms=WARN
