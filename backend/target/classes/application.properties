# ─────────────────────────────────────────────────────────────────────────────
#  SCMS — application.properties  (v1.3 — Production Hardening)
#  Run instructions:
#    Dev:  set environment variable JWT_SECRET=<64+char string>, then mvn spring-boot:run
#    Prod: set all env vars via your deployment platform (Railway, Render, EC2 etc.)
# ─────────────────────────────────────────────────────────────────────────────

server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
# CHANGE ME: replace credentials below OR set DB_URL / DB_USER / DB_PASS env vars.
#
# MENTOR NOTE — env variables in Spring Boot:
# ${VARIABLE:default} means: use VARIABLE if set, else fall back to default.
# In IntelliJ: Run → Edit Configurations → Environment Variables.
# In production: set them in your deployment platform's secrets manager.
# NEVER commit real credentials to Git — ever.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP — Spring Boot's default) ────────────────────────
# MENTOR NOTE — why configure the pool?
# Without this, Spring Boot uses HikariCP defaults (10 connections max).
# For a college demo this is fine. For production under load, tune these.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# IMPORTANT: switch ddl-auto from 'update' to 'validate' before your demo.
# 'update' → Hibernate auto-alters tables (safe in dev, risky in production)
# 'validate' → Hibernate checks schema but never modifies it (safe in production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
#
# CHANGE IN v1.3 — JWT_SECRET now read from environment variable.
#
# MENTOR NOTE — WHY environment variables for secrets:
# If you hardcode the secret and push to GitHub, every person who ever forks
# or clones your repo has your signing key. They can forge JWTs and log in as
# any user, including admin. The fix is one line: use ${JWT_SECRET}.
#
# How to set it in IntelliJ:
#   Run → Edit Configurations → Environment Variables
#   Add: JWT_SECRET=scms-super-secret-key-must-be-at-least-64-characters-long-abc123
#
# The default fallback below is for local dev ONLY — it will print a warning
# if used, reminding you to set the env var in production.
jwt.secret=${JWT_SECRET:scms-dev-only-secret-change-this-in-production-minimum-64-chars-xyz}
jwt.expiration-ms=${JWT_EXPIRY_MS:86400000}

# ── CORS ──────────────────────────────────────────────────────────────────────
# Dev: React Vite dev server on 5173.
# Production: set CORS_ORIGINS env var to your deployed frontend URL.
# Multiple origins: comma-separated e.g. https://scms.example.com,https://www.scms.example.com
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ── Logging ───────────────────────────────────────────────────────────────────
# DEBUG in dev; switch to INFO or WARN in production to reduce log volume.
logging.level.com.scms=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Jackson (JSON serialization) ───────────────────────────────────────────────
# Write LocalDate as "2026-06-19", not [2026,6,19]
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
