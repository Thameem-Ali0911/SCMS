# ─────────────────────────────────────────────────────────────────────────────
#  SCMS — application.properties  (v2.0 — Production Hardening)
#
#  Properties common to every profile. Profile-specific overrides live in
#  application-dev.properties / application-prod.properties / application-test.properties.
#  Activate a profile via SPRING_PROFILES_ACTIVE=dev|prod|test (default: dev — see
#  spring.profiles.active below).
#
#  Quick start:
#    Local dev:    docker compose up -d mysql   (or run your own MySQL)
#                  cd backend && mvn spring-boot:run
#    Docker Compose (full stack): docker compose up --build
#  See README.md for the complete setup guide and environment variable reference.
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=scms

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# CHANGE in v2.0: ddl-auto is ALWAYS validate now — Flyway owns the schema.
# v1.3 shipped with ddl-auto=update, which silently alters production tables.
# See db/migration/V1__baseline_schema.sql and README.md "Database migrations".
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ── JWT ───────────────────────────────────────────────────────────────────────
# CHANGE in v2.0: access + refresh expirations replace the single 24h token.
# jwt.secret MUST be overridden via JWT_SECRET in any real deployment — the
# fallback below is for local dev ONLY.
jwt.secret=${JWT_SECRET:scms-dev-only-secret-change-this-in-production-minimum-64-chars-xyz}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRY_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRY_MS:604800000}

# ── Cookies (refresh token) ───────────────────────────────────────────────────
# Secure=true requires HTTPS. Set COOKIE_SECURE=false ONLY for local http://
# development — never in a deployment reachable over the public internet.
cookie.secure=${COOKIE_SECURE:true}

# ── CORS ──────────────────────────────────────────────────────────────────────
# "Integrating SCMS into another website": add that site's origin(s) here,
# comma-separated. See README.md "Integrating SCMS into another application".
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ── Security ──────────────────────────────────────────────────────────────────
# Comma-separated list of reverse-proxy IPs allowed to set X-Forwarded-For.
# Leave empty (default) to trust NOTHING but the raw TCP peer address — safe
# default. Set to your Nginx/ingress IP once deployed behind one. See
# HttpRequestUtils for the spoofing vulnerability this setting closes.
security.trusted-proxies=${TRUSTED_PROXIES:}
security.hsts.enabled=${HSTS_ENABLED:true}

# ── Email notifications ───────────────────────────────────────────────────────
# Disabled (logged instead of sent) until SMTP is configured — see
# README.md "Configuring email notifications". Safe default with zero
# external dependencies required to run the app correctly.
notifications.email.enabled=${EMAIL_ENABLED:false}
notifications.email.from=${EMAIL_FROM:no-reply@scms.local}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Actuator / Observability ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.tags.application=scms
management.health.mail.enabled=false

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.scms=${SCMS_LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── OpenAPI / Swagger ──────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
