# nginx.conf — serves the React SPA and reverse-proxies /api to the backend.
#
# MENTOR NOTE — this replaces Vite's dev-only proxy for production. The
# `backend` hostname below resolves via Docker Compose's internal DNS (the
# service is named `backend` in docker-compose.yml) — nothing to configure
# if you deploy with `docker compose up`. If you split the frontend and
# backend onto different hosts/domains, replace `http://backend:8080` with
# your backend's real URL and ensure CORS_ORIGINS on the backend includes
# this frontend's origin instead (see SecurityConfig.java).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (defense in depth alongside the backend's own headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # Reverse proxy API calls to the backend container.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required so the HttpOnly refresh-token cookie round-trips correctly.
        proxy_pass_request_headers on;
        proxy_cookie_path /api/auth /api/auth;
    }

    # Single-page app fallback — any unmatched route serves index.html so
    # React Router can handle client-side routing (e.g. a hard refresh on
    # /complaints/42 must not 404 at the web server level).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache immutable hashed assets; never cache index.html itself.
    location ~* \.(js|css|svg|woff2?|ttf|eot|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
